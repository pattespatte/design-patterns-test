<button type="button" class="btn js-toggle-dark-mode" aria-label="Växla mellan ljust och mörkt tema">
	<svg class="theme-icon sun-icon" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
		<circle cx="12" cy="12" r="5"></circle>
		<line x1="12" y1="1" x2="12" y2="3"></line>
		<line x1="12" y1="21" x2="12" y2="23"></line>
		<line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
		<line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
		<line x1="1" y1="12" x2="3" y2="12"></line>
		<line x1="21" y1="12" x2="23" y2="12"></line>
		<line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
		<line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
	</svg>

	<svg class="theme-icon moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
		<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
	</svg>
</button>

<script>
(function () {
	var toggle = document.querySelector('.js-toggle-dark-mode');
	var sunIcon = document.querySelector('.sun-icon');
	var moonIcon = document.querySelector('.moon-icon');

	if (!toggle || !sunIcon || !moonIcon) return;

	function updateIcons(theme) {
		if (theme === 'dark') {
			sunIcon.style.display = 'block';
			moonIcon.style.display = 'none';
			toggle.classList.add('dark-mode');
			toggle.classList.remove('light-mode');
			document.documentElement.classList.add('dark');
		} else {
			sunIcon.style.display = 'none';
			moonIcon.style.display = 'block';
			toggle.classList.add('light-mode');
			toggle.classList.remove('dark-mode');
			document.documentElement.classList.remove('dark');
		}
	}

	function setTheme(theme) {
		updateIcons(theme);
		localStorage.setItem('theme', theme);
		if (typeof jtd !== 'undefined' && jtd.setTheme) {
			jtd.setTheme(theme);
		}
	}

	// Apply saved icon state immediately (prevents flash)
	var currentTheme = localStorage.getItem('theme') || 'light';
	updateIcons(currentTheme);

	// Wait for jtd to be ready before calling setTheme
	function initTheme() {
		if (currentTheme === 'dark') {
			jtd.setTheme('dark');
		}
		jtd.addEvent(toggle, 'click', function () {
			var newTheme = jtd.getTheme() === 'dark' ? 'light' : 'dark';
			setTheme(newTheme);
		});
	}

	if (typeof jtd !== 'undefined' && jtd.onReady) {
		jtd.onReady(initTheme);
	} else {
		document.addEventListener('DOMContentLoaded', function () {
			if (typeof jtd !== 'undefined' && jtd.setTheme) {
				initTheme();
			} else {
				// Fallback: vanilla JS if jtd never loads
				toggle.addEventListener('click', function () {
					var newTheme = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
					setTheme(newTheme);
				});
			}
		});
	}
})();
</script>
